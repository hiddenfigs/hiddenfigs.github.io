media_folder: static/img/uploads
public_folder: /img/uploads

site_url: https://hiddenfigs.github.io
display_url: https://hiddenfigs.github.io
logo_url: https://hiddenfigs.github.io/img/logos/hiddenfigs_logo.png

show_preview_links: true

# Required alongside backend.open_authoring: true - Open Authoring is
# built on top of the editorial workflow (it's what drives the fork +
# PR review flow for non-collaborators).
publish_mode: editorial_workflow

backend:
  name: github
  repo: hiddenfigs/hiddenfigs.github.io
  branch: main
  # This site is hosted on GitHub Pages, not Netlify. A Netlify site is
  # used only to BROKER the GitHub OAuth handshake, through Netlify's
  # OAuth API at api.netlify.com -- NOT through the Netlify site's own
  # subdomain (pointing base_url at hiddenfigs.netlify.app is what caused
  # the /auth 404). See CONTRIBUTING.md for the one-time setup.
  base_url: https://api.netlify.com
  auth_endpoint: auth
  # Netlify's broker matches the OAuth provider by site_id, which Decap
  # otherwise sets to the current hostname (hiddenfigs.github.io) -- a
  # domain Netlify doesn't know about. Force it to the Netlify site where
  # the GitHub provider is installed so the lookup succeeds.
  site_domain: hiddenfigs.netlify.app
  # Lets any GitHub user propose an entry: Decap forks the repo on their
  # behalf, commits there, and opens a PR back to main. No collaborator
  # access required.
  open_authoring: true

yaml-definitions: &page-fields
  - label: "URL path"
    hint: E.g. /about/
    name: url
    widget: string
    required: false
  - label: Title
    name: title
    hint: "Title as it appears at top of page"
    widget: string
  - label: Summary
    name: description
    hint: "Shown in social share previews and search results"
    widget: string
    required: false
  - label: Body
    name: body
    widget: markdown
  - label: "Override title tag"
    name: title-tag
    widget: string
    hint: "Set title tag separately from page hed"
    required: false
  - label: Link to as
    name: linktitle
    hint: "When linking to this page from another page, use this as the link title instead of hed"
    widget: string
    required: false
  - label: "No index"
    name: no-index
    hint: "Hide page on Google etc."
    widget: boolean
    required: false
  - label: URL path aliases
    label_singular: alias
    name: aliases
    widget: list
    default: []
    field:
      label: Path
      name: path
      widget: string

collections:
  # Our data starts here
  - label: "Scientists"
    label_singular: "Scientist"
    name: scientist
    folder: content/scientist
    filter: { field: "layout", value: "person" }
    format: json
    extension: md
    create: True
    slug: "{{title}}"
    preview_path: /scientist/{{slug}}/
    identity_field: "title"
    editor:
      preview: False
    fields:
      - label: Full name
        hint: E.g. "John Jacob Jingleheimer Schmidt, IV PhD CPA"
        name: title
        widget: string
        required: true
      - label: "Name"
        hint: "Shown on the person's page and card"
        name: "name"
        widget: "string"
        required: true
      - label: Link to as
        name: linktitle
        hint: "When linking to this page from another page, use this as the link title instead of the full name"
        widget: string
        required: false
      - label: Last name
        hint: E.g. "Schmidt" or "Smith-Rodriguez"; used to group the A-Z list
        name: last
        widget: string
        required: true
      - label: "Institution of Ph.D."
        name: "institution_of_phd"
        widget: "string"
        required: false
      - label: "Field of Ph.D."
        name: "field_of_phd"
        widget: "string"
        required: false
      - label: "Year of Ph.D."
        hint: "E.g. 1962, or N/A if not applicable"
        name: "year_of_phd"
        widget: "string"
        required: false
      - label: "Research areas"
        hint: "One per line"
        name: "researchAreas"
        widget: "list"
        required: true
      - label: "Relevant courses"
        hint: "One per line"
        name: "relevantCourses"
        widget: "list"
        required: true
      - label: "Relevant concepts"
        hint: "One per line"
        name: "relevant_concepts"
        widget: "list"
        required: false
      - label: "Wikipedia"
        name: "wikipedia"
        widget: "string"
        required: false
      - label: "Images"
        name: "images"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - label: "General bio"
        name: "general_bio"
        widget: "markdown"
        required: true
      - label: "Key contributions"
        name: "key_contributions"
        widget: "list"
        required: true
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Summary"
            name: "summary"
            widget: "text"
      - label: "Citations"
        hint: "DOIs or URLs, one per line"
        name: "citations"
        widget: "list"
        required: false
        field: { label: "Citation", name: "citation", widget: "string" }
      - label: "Level"
        hint: "Who this entry is written for"
        name: "level"
        widget: "select"
        multiple: true
        required: true
        options: ["K12", "UGLD", "UGUD", "G"]

  - label: Landing pages
    name: landing
    editor:
      preview: false
    files:
      - label: "Homepage"
        name: homepage
        file: content/_index.md
        format: toml-frontmatter
        fields: *page-fields
      - label: "Aboutpage"
        name: about
        file: content/about/_index.md
        format: toml-frontmatter
        fields: *page-fields
      - label: "research area page"
        name: researchAreas
        file: content/researchAreas/_index.md
        format: toml-frontmatter
        fields: *page-fields
      - label: "relevant courses page"
        name: relevantCourses
        file: content/relevantCourses/_index.md
        format: toml-frontmatter
        fields: *page-fields
  - label: Content pages
    name: pages
    folder: pages
    format: toml-frontmatter
    extension: md
    create: true
    slug: "{{url}}"
    preview_path: "/{{slug}}/"
    editor:
      preview: false
    fields: *page-fields
  - label: Settings
    name: data
    editor:
      preview: false
    files:
      - label: Menus
        name: menus
        file: config/_default/menus.toml
        fields:
          - label: "Site navbar items"
            label_singular: "menu item"
            name: navbar
            hint: "Only shows on desktops"
            widget: list
            fields: &menu
              - label: "Display Name"
                name: name
                widget: string
                required: true
              - label: URL
                name: url
                widget: string
                required: true
              - label: Order
                name: weight
                widget: number
                value_type: int
                required: false
              - label: Extra parameters
                name: params
                widget: object
                field:
                  { label: Image, name: image, widget: string, required: false }
                required: false
          - label: "Menu items"
            label_singular: "menu item"
            name: mobile
            hint: "Only shows on mobile/tablet"
            widget: list
            fields: *menu
          - label: "Footer menu items"
            label_singular: "menu item"
            name: footer
            hint: "Footer pages list, first column"
            widget: list
            fields: *menu
          - label: "Social menu items"
            label_singular: "menu item"
            name: social
            hint: "Footer social links"
            widget: list
            fields: *menu
